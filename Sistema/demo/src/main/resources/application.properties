# =============================================
# Configuração do banco de dados PostgreSQL
# =============================================
# IMPORTANTE: nunca commitar credenciais reais neste arquivo.
# Em produção, definir as variáveis de ambiente abaixo antes de iniciar a aplicação:
#
#   export DB_URL=jdbc:postgresql://<host>:5432/hospital_db
#   export DB_USER=<usuario>
#   export DB_PASSWORD=<senha>
#
# Para desenvolvimento local, crie um arquivo .env ou defina as variáveis na IDE.
# O arquivo .env está listado no .gitignore e não deve ser versionado.

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hospital_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:210805}

# Hibernate — atualiza o schema automaticamente com base nas entidades Java
# Em produção, considerar "validate" ou usar Flyway/Liquibase para migrações controladas
spring.jpa.hibernate.ddl-auto=update

# Exibe os SQLs gerados no console (útil em desenvolvimento, desativar em produção)
spring.jpa.show-sql=true

# Dialeto PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# WhatsApp Business API
# =============================================
# Token de acesso ao WhatsApp Business API.
# Nunca commitar o token real. Definir via variável de ambiente:
#   export WHATSAPP_TOKEN=<token_real>
whatsapp.token=${WHATSAPP_TOKEN:}